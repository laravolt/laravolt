name: Laravolt Platform

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  laravolt-platform-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: bcmath, ctype, curl, dom, exif, fileinfo, gd, mbstring, pdo_sqlite, sockets, sqlite3, tokenizer, xml, zip, xdebug
        coverage: xdebug
    - uses: actions/checkout@v4
    - name: Install Laravel
      run: composer create-project laravolt/laravel-starter-kit --no-install --no-ansi --no-interaction --no-scripts --prefer-dist laravel
    - name: Copy .env
      run: |
        cd laravel
        php -r "file_exists('.env') || copy('.env.example', '.env');"
    - name: Create Database
      run: |
        cd laravel
        mkdir -p database
        touch database/database.sqlite
    - name: Install Dependencies
      run: |
        cd laravel
        composer config repositories.laravolt path ./..
        composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        composer require brianium/paratest --dev --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Laravel Version
      run: php laravel/artisan --version
    - name: Generate key
      run: |
        cd laravel
        php artisan key:generate
    - name: Directory Permissions
      run: |
        cd laravel
        chmod -R 777 storage bootstrap/cache
    - name: Install package
      run: |
        cd laravel
        php artisan laravolt:install
    - name: Migrate database
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        cd laravel
        php artisan migrate
    - name: Pint test
      run: |
        cd laravel
        ./vendor/bin/pint --test
    - name: Feature tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: ':memory:'
      run: |
        cd laravel
        php artisan test tests/Feature -p --no-coverage
